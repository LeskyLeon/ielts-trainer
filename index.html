<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>IELTS</title><style>body{font-family:-apple-system,sans-serif;max-width:700px;margin:auto;padding:20px}input{width:100%;padding:8px}button{padding:10px}</style></head><body><h1>IELTS Trainer</h1><div>Grammar: <span id="p">0%</span></div><p>1. She ____ (go) tomorrow.</p><input id="a1"><p>2. He ____ (not study) tonight.</p><input id="a2"><br><br><button onclick="sub()">Nộp bài</button><div id="r"></div><script>function sub(){let s=0;if(a1.value.toLowerCase().trim()=="will go")s++;let b=a2.value.toLowerCase().trim();if(b=="won't study"||b=="will not study")s++;localStorage.setItem("g",s*50);p.innerText=(s*50)+"%";r.innerHTML="<h3>Điểm "+s+"/2</h3>";}p.innerText=(localStorage.getItem("g")||0)+"%";</script></body></html>
